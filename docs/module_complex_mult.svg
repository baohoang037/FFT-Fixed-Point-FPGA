<svg viewBox="0 0 520 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="12">
  <rect width="520" height="340" fill="white"/>

  <!-- Title -->
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">complex_mult.v</text>
  <text x="260" y="46" text-anchor="middle" font-size="11" fill="#555">Parameterized Fixed-Point Complex Multiplier</text>

  <!-- Main module box -->
  <rect x="160" y="70" width="200" height="200" rx="6" fill="white" stroke="black" stroke-width="2.5"/>

  <!-- Module label inside -->
  <text x="260" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">complex_mult</text>
  <text x="260" y="106" text-anchor="middle" font-size="10" fill="#555">#(DW, TW)</text>
  <line x1="170" y1="112" x2="350" y2="112" stroke="#ccc" stroke-width="1"/>

  <!-- Formula inside -->
  <text x="260" y="138" text-anchor="middle" font-size="11" fill="#333">t = W_N^k · b</text>
  <text x="260" y="156" text-anchor="middle" font-size="10" fill="#555">cr = cos(2πk/N)</text>
  <text x="260" y="170" text-anchor="middle" font-size="10" fill="#555">ci = −sin(2πk/N)</text>
  <line x1="170" y1="180" x2="350" y2="180" stroke="#eee" stroke-width="1"/>
  <text x="260" y="196" text-anchor="middle" font-size="10" fill="#555">tr = (cr·br − ci·bi + HALF) &gt;&gt; FT</text>
  <text x="260" y="210" text-anchor="middle" font-size="10" fill="#555">ti = (cr·bi + ci·br + HALF) &gt;&gt; FT</text>
  <line x1="170" y1="218" x2="350" y2="218" stroke="#eee" stroke-width="1"/>
  <text x="260" y="232" text-anchor="middle" font-size="10" fill="#888">Output: DW+1 bits (no mid-sat)</text>
  <text x="260" y="246" text-anchor="middle" font-size="10" fill="#888">DSP48E1 (W≥12) / LUT (W&lt;12)</text>
  <text x="260" y="260" text-anchor="middle" font-size="10" fill="#888">Round half-up, Q1.(W-1) × Q1.(TW-1)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="black"/>
    </marker>
  </defs>

  <!-- Input ports LEFT -->
  <!-- br -->
  <line x1="30" y1="130" x2="160" y2="130" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="25" y="127" text-anchor="end" font-size="11" fill="#111">br [DW-1:0]</text>
  <text x="25" y="141" text-anchor="end" font-size="9" fill="#888">data real</text>
  <!-- bi -->
  <line x1="30" y1="160" x2="160" y2="160" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="25" y="157" text-anchor="end" font-size="11" fill="#111">bi [DW-1:0]</text>
  <text x="25" y="171" text-anchor="end" font-size="9" fill="#888">data imag</text>
  <!-- cr -->
  <line x1="30" y1="195" x2="160" y2="195" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="25" y="192" text-anchor="end" font-size="11" fill="#111">cr [TW-1:0]</text>
  <text x="25" y="206" text-anchor="end" font-size="9" fill="#888">twiddle real (cos)</text>
  <!-- ci -->
  <line x1="30" y1="225" x2="160" y2="225" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="25" y="222" text-anchor="end" font-size="11" fill="#111">ci [TW-1:0]</text>
  <text x="25" y="236" text-anchor="end" font-size="9" fill="#888">twiddle imag (−sin)</text>

  <!-- Output ports RIGHT -->
  <!-- tr -->
  <line x1="360" y1="155" x2="490" y2="155" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="494" y="152" font-size="11" fill="#111">tr [DW:0]</text>
  <text x="494" y="165" font-size="9" fill="#888">result real (DW+1 b)</text>
  <!-- ti -->
  <line x1="360" y1="210" x2="490" y2="210" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="494" y="207" font-size="11" fill="#111">ti [DW:0]</text>
  <text x="494" y="220" font-size="9" fill="#888">result imag (DW+1 b)</text>

  <!-- Parameter box bottom -->
  <rect x="100" y="292" width="320" height="38" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="260" y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Parameters</text>
  <text x="260" y="323" text-anchor="middle" font-size="10" fill="#555">DW — data word length    TW — twiddle word length    FT = TW−1</text>
</svg>