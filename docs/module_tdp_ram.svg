<svg viewBox="0 0 580 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="12">
  <rect width="580" height="360" fill="white"/>

  <text x="290" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">tdp_ram.v</text>
  <text x="290" y="46" text-anchor="middle" font-size="11" fill="#555">True Dual-Port Block RAM — instantiated as u_ram_r (real) and u_ram_i (imag)</text>

  <rect x="165" y="65" width="250" height="230" rx="6" fill="white" stroke="black" stroke-width="2.5"/>
  <text x="290" y="84" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">tdp_ram</text>
  <text x="290" y="98" text-anchor="middle" font-size="10" fill="#555">#(DW, N, AW)</text>
  <line x1="175" y1="104" x2="405" y2="104" stroke="#ccc"/>

  <!-- Port A label -->
  <text x="210" y="120" font-size="10" font-weight="bold" fill="#333">Port A — FSM address p0</text>
  <line x1="175" y1="125" x2="405" y2="125" stroke="#eee"/>
  <text x="185" y="140" font-size="9" fill="#555">addr_a, din_a, we_a → dout_a</text>

  <!-- Port B label -->
  <text x="210" y="165" font-size="10" font-weight="bold" fill="#333">Port B — FSM address p1 / rd_addr</text>
  <line x1="175" y1="170" x2="405" y2="170" stroke="#eee"/>
  <text x="185" y="185" font-size="9" fill="#555">addr_b, din_b, we_b → dout_b</text>

  <line x1="175" y1="200" x2="405" y2="200" stroke="#eee"/>
  <text x="290" y="216" text-anchor="middle" font-size="10" fill="#888">1024 × DW-bit synchronous RAM</text>
  <text x="290" y="230" text-anchor="middle" font-size="10" fill="#888">Read-first behavior on each port</text>
  <text x="290" y="244" text-anchor="middle" font-size="10" fill="#888">ram_style="block" → RAMB18E1</text>
  <text x="290" y="258" text-anchor="middle" font-size="10" fill="#888">1-cycle registered read latency</text>
  <text x="290" y="272" text-anchor="middle" font-size="10" fill="#888">One always-block per port (Xilinx template)</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="black"/>
    </marker>
  </defs>

  <!-- PORT A inputs left -->
  <line x1="20" y1="110" x2="165" y2="110" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="15" y="107" text-anchor="end" font-size="11" fill="#111">clk</text>

  <line x1="20" y1="135" x2="165" y2="135" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="15" y="132" text-anchor="end" font-size="11" fill="#111">addr_a [AW-1:0]</text>

  <line x1="20" y1="158" x2="165" y2="158" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="15" y="155" text-anchor="end" font-size="11" fill="#111">din_a [DW-1:0]</text>

  <line x1="20" y1="178" x2="165" y2="178" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="15" y="175" text-anchor="end" font-size="11" fill="#111">we_a</text>

  <!-- PORT B inputs left -->
  <line x1="20" y1="210" x2="165" y2="210" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="15" y="207" text-anchor="end" font-size="11" fill="#111">addr_b [AW-1:0]</text>

  <line x1="20" y1="232" x2="165" y2="232" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="15" y="229" text-anchor="end" font-size="11" fill="#111">din_b [DW-1:0]</text>

  <line x1="20" y1="252" x2="165" y2="252" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="15" y="249" text-anchor="end" font-size="11" fill="#111">we_b</text>

  <!-- Outputs right -->
  <line x1="415" y1="148" x2="558" y2="148" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="561" y="145" font-size="11" fill="#111">dout_a [DW-1:0]</text>
  <text x="561" y="158" font-size="9" fill="#888">Port A read data</text>

  <line x1="415" y1="230" x2="558" y2="230" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="561" y="227" font-size="11" fill="#111">dout_b [DW-1:0]</text>
  <text x="561" y="240" font-size="9" fill="#888">Port B read data</text>

  <!-- Note box -->
  <rect x="80" y="316" width="420" height="35" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="290" y="330" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Instantiated twice inside fft_top.v</text>
  <text x="290" y="344" text-anchor="middle" font-size="9" fill="#555">u_ram_r (real part array)   ·   u_ram_i (imaginary part array)</text>
</svg>