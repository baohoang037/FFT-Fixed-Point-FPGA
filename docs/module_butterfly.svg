<svg viewBox="0 0 560 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="12">
  <rect width="560" height="380" fill="white"/>

  <text x="280" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">butterfly.v</text>
  <text x="280" y="46" text-anchor="middle" font-size="11" fill="#555">Radix-2 DIT Butterfly with Per-Stage Overflow Scaling (÷2)</text>

  <!-- Main box -->
  <rect x="170" y="65" width="220" height="245" rx="6" fill="white" stroke="black" stroke-width="2.5"/>
  <text x="280" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">butterfly</text>
  <text x="280" y="99" text-anchor="middle" font-size="10" fill="#555">#(DW, TW)</text>
  <line x1="180" y1="105" x2="380" y2="105" stroke="#ccc"/>

  <!-- Sub-module box: complex_mult inside -->
  <rect x="185" y="112" width="190" height="50" rx="4" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="280" y="132" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">complex_mult</text>
  <text x="280" y="147" text-anchor="middle" font-size="9" fill="#555">t = W_N^k · b  →  tr, ti [DW:0]</text>

  <line x1="180" y1="170" x2="380" y2="170" stroke="#eee"/>

  <!-- Operations inside -->
  <text x="280" y="188" text-anchor="middle" font-size="10" fill="#333">o0 = (a + t + 1) &gt;&gt; 1</text>
  <text x="280" y="203" text-anchor="middle" font-size="10" fill="#333">o1 = (a − t + 1) &gt;&gt; 1</text>
  <line x1="180" y1="212" x2="380" y2="212" stroke="#eee"/>
  <text x="280" y="228" text-anchor="middle" font-size="10" fill="#888">+1 = round half-up</text>
  <text x="280" y="242" text-anchor="middle" font-size="10" fill="#888">&gt;&gt;1 = ÷2 overflow guard</text>
  <text x="280" y="256" text-anchor="middle" font-size="10" fill="#888">Saturated to [−2^(W-1), 2^(W-1)−1]</text>
  <line x1="180" y1="265" x2="380" y2="265" stroke="#eee"/>
  <text x="280" y="280" text-anchor="middle" font-size="10" fill="#888">After 10 stages: output = DFT{x}/N</text>
  <text x="280" y="294" text-anchor="middle" font-size="10" fill="#888">Fully combinational — no clock</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="black"/>
    </marker>
  </defs>

  <!-- Inputs LEFT -->
  <line x1="25" y1="115" x2="170" y2="115" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="20" y="112" text-anchor="end" font-size="11" fill="#111">ar [DW-1:0]</text>
  <text x="20" y="125" text-anchor="end" font-size="9" fill="#888">top real</text>

  <line x1="25" y1="145" x2="170" y2="145" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="20" y="142" text-anchor="end" font-size="11" fill="#111">ai [DW-1:0]</text>
  <text x="20" y="155" text-anchor="end" font-size="9" fill="#888">top imag</text>

  <line x1="25" y1="185" x2="170" y2="185" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="20" y="182" text-anchor="end" font-size="11" fill="#111">br [DW-1:0]</text>
  <text x="20" y="195" text-anchor="end" font-size="9" fill="#888">bottom real</text>

  <line x1="25" y1="215" x2="170" y2="215" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="20" y="212" text-anchor="end" font-size="11" fill="#111">bi [DW-1:0]</text>
  <text x="20" y="225" text-anchor="end" font-size="9" fill="#888">bottom imag</text>

  <line x1="25" y1="248" x2="170" y2="248" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="20" y="245" text-anchor="end" font-size="11" fill="#111">w_cos [TW-1:0]</text>
  <text x="20" y="258" text-anchor="end" font-size="9" fill="#888">twiddle cos</text>

  <line x1="25" y1="278" x2="170" y2="278" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="20" y="275" text-anchor="end" font-size="11" fill="#111">w_sin [TW-1:0]</text>
  <text x="20" y="288" text-anchor="end" font-size="9" fill="#888">twiddle sin</text>

  <!-- Outputs RIGHT -->
  <line x1="390" y1="130" x2="535" y2="130" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="538" y="127" font-size="11" fill="#111">o0r [DW-1:0]</text>
  <text x="538" y="140" font-size="9" fill="#888">top output real</text>

  <line x1="390" y1="168" x2="535" y2="168" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="538" y="165" font-size="11" fill="#111">o0i [DW-1:0]</text>
  <text x="538" y="178" font-size="9" fill="#888">top output imag</text>

  <line x1="390" y1="220" x2="535" y2="220" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="538" y="217" font-size="11" fill="#111">o1r [DW-1:0]</text>
  <text x="538" y="230" font-size="9" fill="#888">bottom output real</text>

  <line x1="390" y1="258" x2="535" y2="258" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="538" y="255" font-size="11" fill="#111">o1i [DW-1:0]</text>
  <text x="538" y="268" font-size="9" fill="#888">bottom output imag</text>

  <!-- Parameter box -->
  <rect x="130" y="330" width="300" height="38" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="280" y="346" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Parameters</text>
  <text x="280" y="361" text-anchor="middle" font-size="10" fill="#555">DW — data word length    TW — twiddle word length</text>
</svg>