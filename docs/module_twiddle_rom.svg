<svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="12">
  <rect width="500" height="300" fill="white"/>

  <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">twiddle_rom.v</text>
  <text x="250" y="46" text-anchor="middle" font-size="11" fill="#555">Twiddle Factor ROM — cos and sin tables for W_N^k</text>

  <rect x="155" y="65" width="190" height="175" rx="6" fill="white" stroke="black" stroke-width="2.5"/>
  <text x="250" y="84" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">twiddle_rom</text>
  <text x="250" y="98" text-anchor="middle" font-size="10" fill="#555">#(TW, N)</text>
  <line x1="165" y1="104" x2="335" y2="104" stroke="#ccc"/>

  <text x="250" y="122" text-anchor="middle" font-size="10" fill="#555">cosm[0..N/2−1]</text>
  <text x="250" y="136" text-anchor="middle" font-size="10" fill="#555">sinm[0..N/2−1]</text>
  <line x1="165" y1="144" x2="335" y2="144" stroke="#eee"/>
  <text x="250" y="160" text-anchor="middle" font-size="10" fill="#888">512 entries × TW bit</text>
  <text x="250" y="174" text-anchor="middle" font-size="10" fill="#888">Q1.(TW−1) format</text>
  <text x="250" y="188" text-anchor="middle" font-size="10" fill="#888">Loaded at startup via $readmemh</text>
  <text x="250" y="202" text-anchor="middle" font-size="10" fill="#888">rom_style="block" → RAMB18E1</text>
  <text x="250" y="216" text-anchor="middle" font-size="10" fill="#888">1-cycle registered read latency</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="black"/>
    </marker>
  </defs>

  <!-- Inputs -->
  <line x1="25" y1="120" x2="155" y2="120" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="20" y="117" text-anchor="end" font-size="11" fill="#111">clk</text>
  <text x="20" y="130" text-anchor="end" font-size="9" fill="#888">system clock</text>

  <line x1="25" y1="165" x2="155" y2="165" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="20" y="162" text-anchor="end" font-size="11" fill="#111">addr [AW-2:0]</text>
  <text x="20" y="175" text-anchor="end" font-size="9" fill="#888">ROM read address (0..511)</text>

  <!-- Outputs -->
  <line x1="345" y1="140" x2="475" y2="140" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="478" y="137" font-size="11" fill="#111">w_cos [TW-1:0]</text>
  <text x="478" y="150" font-size="9" fill="#888">cos(2πk/N), registered</text>

  <line x1="345" y1="185" x2="475" y2="185" stroke="black" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="478" y="182" font-size="11" fill="#111">w_sin [TW-1:0]</text>
  <text x="478" y="195" font-size="9" fill="#888">sin(2πk/N), registered</text>

  <!-- Init files note -->
  <rect x="100" y="258" width="300" height="32" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="250" y="272" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Initialization files (set via parameter)</text>
  <text x="250" y="284" text-anchor="middle" font-size="9" fill="#555">COS_FILE = "tw_cos.hex"    SIN_FILE = "tw_sin.hex"</text>
</svg>